# Development override — only starts the database
# Usage: docker compose -f docker-compose.dev.yml up -d
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: metas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d metas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
