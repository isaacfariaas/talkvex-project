<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1080" height="1080" fill="#0B0F1A"/>
  
  <!-- Decorative Circles -->
  <circle cx="540" cy="540" r="400" stroke="#7C3AED" stroke-width="1" opacity="0.1"/>
  <circle cx="540" cy="540" r="300" stroke="#4F6EFF" stroke-width="1" opacity="0.1"/>

  <!-- Logo -->
  <text x="540" y="80" text-anchor="middle" fill="#4F6EFF" font-family="Inter, sans-serif" font-size="28" font-weight="bold">◆ TALKVEX</text>

  <!-- Headline -->
  <text x="540" y="200" text-anchor="middle" fill="#EEF2F8" font-family="Inter, sans-serif" font-size="48" font-weight="bold">
    <tspan x="540" dy="0">De meta vaga a</tspan>
    <tspan x="540" dy="60">rotina de ação.</tspan>
  </text>
  
  <text x="540" y="320" text-anchor="middle" fill="#7A8BA8" font-family="Inter, sans-serif" font-size="24">Em apenas 60 segundos.</text>

  <!-- App Mockup -->
  <g transform="translate(340, 400)">
    <!-- Phone Frame -->
    <rect x="0" y="0" width="400" height="550" rx="40" fill="#141927" stroke="#222D42" stroke-width="8"/>
    <rect x="150" y="20" width="100" height="20" rx="10" fill="#0B0F1A"/> <!-- Notch -->
    
    <!-- UI Content -->
    <g transform="translate(30, 70)">
       <!-- Header -->
       <text x="0" y="20" fill="#EEF2F8" font-family="Inter, sans-serif" font-size="18" font-weight="bold">Bom dia, Isaac! ✨</text>
       
       <!-- Goal Card -->
       <rect x="0" y="50" width="340" height="100" rx="12" fill="#4F6EFF" opacity="0.1" stroke="#4F6EFF" stroke-opacity="0.3"/>
       <text x="15" y="80" fill="#4F6EFF" font-family="Inter, sans-serif" font-size="14" font-weight="bold">META ATIVA</text>
       <text x="15" y="105" fill="#EEF2F8" font-family="Inter, sans-serif" font-size="16">Lançar SaaS em 6 meses</text>
       <rect x="15" y="125" width="310" height="8" rx="4" fill="#222D42"/>
       <rect x="15" y="125" width="130" height="8" rx="4" fill="#10B981"/> <!-- Progress -->
       
       <!-- Tasks -->
       <text x="0" y="190" fill="#7A8BA8" font-family="Inter, sans-serif" font-size="14" font-weight="bold">FOCO DE HOJE</text>
       
       <rect x="0" y="210" width="340" height="50" rx="8" fill="#1C2538"/>
       <circle cx="25" cy="235" r="10" stroke="#4F6EFF" stroke-width="2" fill="none"/>
       <text x="50" y="240" fill="#EEF2F8" font-family="Inter, sans-serif" font-size="14">Configurar Auth</text>
       
       <rect x="0" y="270" width="340" height="50" rx="8" fill="#1C2538"/>
       <circle cx="25" cy="295" r="10" stroke="#4F6EFF" stroke-width="2" fill="none"/>
       <text x="50" y="300" fill="#EEF2F8" font-family="Inter, sans-serif" font-size="14">Deploy Vercel</text>

       <!-- AI Sparkle Icon -->
       <path d="M 310 20 L 315 30 L 325 35 L 315 40 L 310 50 L 305 40 L 295 35 L 305 30 Z" fill="#7C3AED">
          <animate attributeName="transform" type="scale" values="1;1.2;1" dur="2s" repeatCount="indefinite" />
       </path>
    </g>

    <!-- Navigation Bar -->
    <rect x="20" y="480" width="360" height="50" rx="25" fill="#1C2538"/>
    <circle cx="70" cy="505" r="15" fill="#4F6EFF" opacity="0.2"/>
    <circle cx="155" cy="505" r="15" fill="#7A8BA8" opacity="0.2"/>
    <circle cx="240" cy="505" r="15" fill="#7A8BA8" opacity="0.2"/>
    <circle cx="325" cy="505" r="15" fill="#7C3AED" opacity="0.2"/>
  </g>

  <!-- Tagline CTA -->
  <text x="540" y="1020" text-anchor="middle" fill="#EEF2F8" font-family="Inter, sans-serif" font-size="20" font-weight="bold">Comece agora: talkvex.com</text>
</svg>
